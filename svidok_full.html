<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Свідок</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0A0A0A; --surface:#141414; --border:#222;
    --muted:#333; --dim:#555; --text:#C2BDB4;
    --hi:#EDE8E0; --accent:#7C6B52; --accent-l:#A08B6E;
  }
  html,body { height:100%; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif; font-weight:300; -webkit-font-smoothing:antialiased; }

  /* ── SCREENS ── */
  .screen { display:none; flex-direction:column; height:100dvh; }
  .screen.active { display:flex; }

  /* ── AUTH ── */
  .auth-wrap {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:32px 24px; gap:32px;
  }
  .brand { text-align:center; }
  .brand-name {
    font-family:'Cormorant Garamond',serif; font-size:48px;
    font-weight:300; letter-spacing:0.2em; color:var(--hi);
  }
  .brand-name span { color:var(--accent); }
  .brand-sub { font-size:12px; color:var(--dim); letter-spacing:0.12em;
    text-transform:uppercase; margin-top:8px; }
  .auth-form { width:100%; max-width:360px; display:flex; flex-direction:column; gap:12px; }
  .auth-input {
    background:var(--surface); border:1px solid var(--border);
    border-radius:2px; padding:14px 16px; color:var(--hi);
    font-family:'Inter',sans-serif; font-size:14px; font-weight:300;
    outline:none; transition:border-color 0.2s; width:100%;
  }
  .auth-input::placeholder { color:var(--dim); }
  .auth-input:focus { border-color:var(--muted); }
  .auth-btn {
    background:var(--accent); border:none; border-radius:2px;
    padding:14px; color:var(--hi); font-family:'Inter',sans-serif;
    font-size:13px; font-weight:400; letter-spacing:0.08em;
    text-transform:uppercase; cursor:pointer; transition:background 0.2s;
  }
  .auth-btn:hover { background:var(--accent-l); }
  .auth-switch { text-align:center; font-size:12px; color:var(--dim); }
  .auth-switch a { color:var(--accent-l); cursor:pointer; text-decoration:none; }
  .auth-line { display:flex; align-items:center; gap:12px; }
  .auth-line::before,.auth-line::after {
    content:''; flex:1; height:1px; background:var(--border); }
  .auth-line span { font-size:11px; color:var(--dim); white-space:nowrap; }

  /* ── ONBOARDING ── */
  .onboard-wrap {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:40px 28px; gap:24px;
  }
  .onboard-q {
    font-family:'Cormorant Garamond',serif; font-size:24px;
    font-weight:300; color:var(--hi); text-align:center; line-height:1.4;
  }
  .onboard-hint { font-size:12px; color:var(--dim); text-align:center; }
  .onboard-input {
    background:var(--surface); border:1px solid var(--border);
    border-radius:2px; padding:14px 16px; color:var(--hi);
    font-family:'Inter',sans-serif; font-size:15px; font-weight:300;
    outline:none; width:100%; max-width:360px; text-align:center;
    transition:border-color 0.2s;
  }
  .onboard-input:focus { border-color:var(--muted); }
  .onboard-btn {
    background:none; border:1px solid var(--muted); border-radius:2px;
    padding:12px 32px; color:var(--text); font-family:'Inter',sans-serif;
    font-size:13px; cursor:pointer; transition:all 0.2s;
  }
  .onboard-btn:hover { border-color:var(--accent); color:var(--accent-l); }
  .onboard-progress { display:flex; gap:6px; }
  .onboard-dot { width:4px; height:4px; border-radius:50%; background:var(--muted); }
  .onboard-dot.active { background:var(--accent); }

  /* ── CHAT ── */
  .chat-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 24px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .chat-logo { font-family:'Cormorant Garamond',serif; font-size:20px;
    font-weight:300; letter-spacing:0.14em; color:var(--hi); }
  .chat-logo span { color:var(--accent); }
  .chat-user-info { font-size:11px; color:var(--dim); text-align:right; }
  .messages { flex:1; overflow-y:auto; padding:28px 20px;
    display:flex; flex-direction:column; gap:24px; scrollbar-width:none; }
  .messages::-webkit-scrollbar { width:0; }
  .msg { display:flex; flex-direction:column; gap:5px; animation:fadeUp 0.35s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg-who { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); padding:0 3px; }
  .msg.user .msg-who { text-align:right; color:var(--accent); }
  .msg-bubble { padding:14px 18px; border-radius:2px; line-height:1.75; font-size:15px; max-width:90%; }
  .msg.bot .msg-bubble {
    background:var(--surface); border-left:2px solid var(--accent);
    font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--hi);
    align-self:flex-start; white-space:pre-wrap;
  }
  .msg.user .msg-bubble {
    background:#161616; border:1px solid var(--border);
    align-self:flex-end; font-size:14px;
  }
  .typing { display:flex; align-items:center; gap:5px;
    padding:16px 18px; background:var(--surface);
    border-left:2px solid var(--accent); border-radius:2px; width:fit-content; }
  .typing span { width:4px; height:4px; background:var(--accent);
    border-radius:50%; animation:pulse 1.4s ease infinite; }
  .typing span:nth-child(2){animation-delay:0.2s}
  .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
  .input-area { padding:14px 20px 22px; border-top:1px solid var(--border);
    flex-shrink:0; background:var(--bg); }
  .input-wrap { display:flex; align-items:flex-end; gap:10px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:2px; padding:11px 14px; transition:border-color 0.2s; }
  .input-wrap:focus-within { border-color:var(--muted); }
  textarea { flex:1; background:none; border:none; outline:none; color:var(--hi);
    font-family:'Inter',sans-serif; font-size:14px; font-weight:300;
    line-height:1.6; resize:none; min-height:22px; max-height:100px; overflow-y:auto; }
  textarea::placeholder { color:var(--dim); }
  textarea::-webkit-scrollbar{width:0}
  .send-btn { background:none; border:none; cursor:pointer; color:var(--dim);
    padding:2px; transition:color 0.2s; flex-shrink:0; }
  .send-btn:hover{color:var(--accent-l)} .send-btn:disabled{opacity:0.3;cursor:default}
  .send-btn svg{width:17px;height:17px}
  .chat-footer { text-align:center; font-size:11px; color:var(--dim); margin-top:8px; }
  .privacy-note { background:var(--surface); border:1px solid var(--border);
    border-radius:2px; padding:10px 14px; font-size:11px; color:var(--dim);
    line-height:1.6; text-align:center; margin-bottom:20px; }
  .privacy-note strong { color:var(--text); font-weight:400; }
</style>
</head>

function getZodiac(day, month) {
  const signs = [
    [20,'Козеріг'],[19,'Водолій'],[20,'Риби'],[20,'Овен'],
    [21,'Телець'],[21,'Близнюки'],[22,'Рак'],[22,'Лев'],
    [23,'Діва'],[23,'Терези'],[22,'Скорпіон'],[22,'Стрілець'],[31,'Козеріг']
  ];
  return day <= signs[month-1][0] ? signs[month-1][1] : signs[month][1];
}

function getChineseSign(year) {
  const signs = ['Мавпа','Півень','Собака','Кабан','Пацюк','Бик',
    'Тигр','Кролик','Дракон','Змія','Кінь','Коза'];
  return signs[year % 12];
}

function getLifePath(day, month, year) {
  const sum = str => str.split('').reduce((a,b)=>a+parseInt(b),0);
  let n = sum(`${day}`) + sum(`${month}`) + sum(`${year}`);
  while(n > 9 && n !== 11 && n !== 22) { n = sum(`${n}`); }
  return n;
}

function buildAstroProfile(birthdate) {
  try {

}

// ── SUPABASE ──────────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    }
  });
  return res.json();
}

async function getOrCreateUser(email, name, birthdate) {
  const existing = await sbFetch(`/rest/v1/users?email=eq.${encodeURIComponent(email)}`);
  if(existing && existing.length > 0) return existing[0];
  const astro = buildAstroProfile(birthdate);
  const created = await sbFetch('/rest/v1/users', {
    method:'POST',
    body: JSON.stringify({ email, name, birthdate, astro: JSON.stringify(astro), memory:'' })
  });
  return created[0];
}

async function updateMemory(userId, newMemory) {
  await sbFetch(`/rest/v1/users?id=eq.${userId}`, {
    method: 'PATCH',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ memory: newMemory })
  });
}

// ── AUTH ──────────────────────────────────────────────────────────
function showReg() {
  document.getElementById('login-form').style.display='none';
  document.getElementById('reg-form').style.display='flex';
}
function showLogin() {
  document.getElementById('reg-form').style.display='none';
  document.getElementById('login-form').style.display='flex';
}
function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display='block';
  setTimeout(()=>el.style.display='none', 3000);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if(!email||!pass) return showError('Заповни всі поля');
  const users = await sbFetch(`/rest/v1/users?email=eq.${encodeURIComponent(email)}`);
  if(!users||!users.length) return showError('Акаунт не знайдено');
  currentUser = users[0];
  startChat();
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if(!name||!email||!pass) return showError('Заповни всі поля');
  onboardData.name = name;
  onboardData.email = email;
  onboardData.pass = pass;
  showScreen('onboard');
  updateOnboardStep(0);
}

// ── ONBOARDING ────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function updateOnboardStep(step) {
  onboardStep = step;
  document.querySelectorAll('.onboard-dot').forEach((d,i)=>{
    d.classList.toggle('active', i<=step);
  });
  const s = onboardSteps[step];
  document.getElementById('onboard-q').textContent = s.q;
  document.getElementById('onboard-hint').textContent = s.hint;
  document.getElementById('onboard-input').value = '';
  document.getElementById('onboard-input').focus();
}

async function nextOnboard() {
  const val = document.getElementById('onboard-input').value.trim();
  if(!val) return;
  onboardData[onboardSteps[onboardStep].key] = val;
  if(onboardStep < onboardSteps.length - 1) {
    updateOnboardStep(onboardStep + 1);
  } else {
    // Create user
    try {
      const astro = buildAstroProfile(onboardData.birthdate);
      const res = await sbFetch('/rest/v1/users', {
        method:'POST',
        body: JSON.stringify({
          email: onboardData.email,
          name: onboardData.name,
          birthdate: onboardData.birthdate,
          astro: JSON.stringify(astro),
          memory: ''
        })
      });
      currentUser = res[0];
      startChat(onboardData.first);
    } catch(e) { alert('Помилка створення акаунту. Спробуй ще раз.'); }
  }
}

document.getElementById('onboard-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') nextOnboard();
});

  if(currentUser.name) {
    document.getElementById('chat-user-info').textContent =
      astro ? `${currentUser.name} · ${astro.zodiac}` : currentUser.name;
  }
  if(firstMessage) {
    setTimeout(()=>processMessage(firstMessage, true), 600);
  } else {
    setTimeout(()=>addBotMessage('Що зараз відбувається?'), 500);
  }
}

function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
  document.getElementById('send-btn').disabled = el.value.trim()==='';
}

function handleKey(e) {
  if(e.key==='Enter'&&!e.shiftKey) {
    e.preventDefault();
    if(!document.getElementById('send-btn').disabled) send();
  }
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role==='user'?'user':'bot'}`;
  const who = document.createElement('div');
  who.className = 'msg-who';
  who.textContent = role==='user' ? (currentUser?.name||'Ти') : 'Свідок';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  div.appendChild(who); div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function addBotMessage(text) {
  const bubble = addMessage('assistant', '');
  typewrite(bubble, text);
}

function typewrite(el, text, speed=15) {
  let i=0;
  el.textContent='';
  function next() {
    if(i<text.length) {
      el.textContent+=text[i]; i++;
      document.getElementById('messages').scrollTop=99999;
      setTimeout(next, speed);
    }
  }
  next();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg bot'; div.id='typing-ind';
  const who = document.createElement('div');
  who.className='msg-who'; who.textContent='Свідок';
  const t = document.createElement('div');
  t.className='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  div.appendChild(who); div.appendChild(t);
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping() {
  const el=document.getElementById('typing-ind');
  if(el) el.remove();
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text||isLoading) return;
  input.value=''; input.style.height='auto';
  document.getElementById('send-btn').disabled=true;
  await processMessage(text, false);
}

async function processMessage(text, isFirst) {
  if(!isFirst) addMessage('user', text);
  history.push({role:'user', content: text});
  isLoading=true;
  showTyping();
  await new Promise(r=>setTimeout(r, 1000+Math.random()*800));
  try {
    const astro = currentUser?.astro ? JSON.parse(currentUser.astro) : null;
    const profile = { astro, memory: currentUser?.memory||'' };
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json',
        'x-api-key': ANTHROPIC_KEY, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        system: buildSystemPrompt(profile),
        messages: history
      })
    });
    const data = await res.json();
    let reply = data.content?.[0]?.text || '...';
    // Extract memory update
    const memMatch = reply.match(/MEMORY_UPDATE:\s*(.+)$/m);
    if(memMatch && memMatch[1] && memMatch[1]!=='none' && currentUser) {
      const newMem = (currentUser.memory ? currentUser.memory+'\n' : '') + memMatch[1];
      currentUser.memory = newMem;
      await updateMemory(currentUser.id, newMem);
    }
    // Clean reply
    reply = reply.replace(/\nMEMORY_UPDATE:.+$/m,'').trim();
    removeTyping();
    addBotMessage(reply);
    history.push({role:'assistant', content: reply});
  } catch(e) {
    removeTyping();
    addBotMessage('Щось пішло не так. Спробуй ще раз.');
  }
  isLoading=false;
}
</script>
