<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Svidok</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0A0A0A;--surface:#141414;--border:#222;--muted:#333;--dim:#555;--text:#C2BDB4;--hi:#EDE8E0;--accent:#7C6B52;--accent-l:#A08B6E}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased}
  .screen{display:none;flex-direction:column;height:100dvh}
  .screen.active{display:flex}
  .auth-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:28px}
  .brand{text-align:center}
  .brand-name{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;letter-spacing:0.22em;color:var(--hi)}
  .brand-name span{color:var(--accent)}
  .brand-sub{font-size:11px;color:var(--dim);letter-spacing:0.14em;text-transform:uppercase;margin-top:8px}
  .auth-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
  .auth-input{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:13px 15px;color:var(--hi);font-family:'Inter',sans-serif;font-size:16px;font-weight:300;outline:none;transition:border-color 0.2s;width:100%;-webkit-appearance:none}
  .auth-input::placeholder{color:var(--dim)}
  .auth-input:focus{border-color:var(--muted)}
  .auth-btn{background:var(--accent);border:none;border-radius:2px;padding:16px;color:var(--hi);font-family:'Inter',sans-serif;font-size:13px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;width:100%}
  .auth-switch{text-align:center;font-size:12px;color:var(--dim)}
  .auth-switch a{color:var(--accent-l);cursor:pointer}
  .auth-line{display:flex;align-items:center;gap:12px}
  .auth-line::before,.auth-line::after{content:'';flex:1;height:1px;background:var(--border)}
  .auth-line span{font-size:11px;color:var(--dim)}
  .err{font-size:12px;color:#e74c3c;text-align:center;display:none;padding:8px;background:#1a0a0a;border-radius:2px}
  .onboard-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:24px}
  .onboard-q{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--hi);text-align:center;line-height:1.4}
  .onboard-hint{font-size:12px;color:var(--dim);text-align:center}
  .ob-input{background:var(--surface);border:1px solid var(--accent);border-radius:2px;padding:16px 15px;color:var(--hi);font-family:'Inter',sans-serif;font-size:16px;font-weight:300;outline:none;width:100%;text-align:center;-webkit-appearance:none;appearance:none}
  .ob-input:focus{border-color:var(--accent-l)}
  .ob-btn{background:var(--accent);border:none;border-radius:2px;padding:16px;color:var(--hi);font-family:'Inter',sans-serif;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .dots{display:flex;gap:6px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
  .dot.active{background:var(--accent)}
  .chat-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
  .chat-logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:0.16em;color:var(--hi)}
  .chat-logo span{color:var(--accent)}
  .chat-meta{font-size:11px;color:var(--dim)}
  .messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 18px;display:flex;flex-direction:column;gap:20px;scrollbar-width:none}
  .messages::-webkit-scrollbar{width:0}
  .msg{display:flex;flex-direction:column;gap:4px;animation:fadeUp 0.35s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg-who{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);padding:0 3px}
  .msg.user .msg-who{text-align:right;color:var(--accent)}
  .msg-bubble{padding:13px 16px;border-radius:2px;line-height:1.75;max-width:90%}
  .msg.bot .msg-bubble{background:var(--surface);border-left:2px solid var(--accent);font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--hi);align-self:flex-start;white-space:pre-wrap}
  .msg.user .msg-bubble{background:#161616;border:1px solid var(--border);align-self:flex-end;font-size:14px}
  .typing{display:flex;align-items:center;gap:5px;padding:14px 16px;background:var(--surface);border-left:2px solid var(--accent);border-radius:2px;width:fit-content}
  .typing span{width:4px;height:4px;background:var(--accent);border-radius:50%;animation:pulse 1.4s ease infinite}
  .typing span:nth-child(2){animation-delay:0.2s}
  .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
  .input-area{padding:12px 18px 28px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
  .input-wrap{display:flex;align-items:flex-end;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:10px 13px}
  .input-wrap:focus-within{border-color:var(--muted)}
  textarea{flex:1;background:none;border:none;outline:none;color:var(--hi);font-family:'Inter',sans-serif;font-size:16px;font-weight:300;line-height:1.6;resize:none;min-height:22px;max-height:100px;overflow-y:auto;-webkit-appearance:none}
  textarea::placeholder{color:var(--dim)}
  .send-btn{background:var(--accent);border:none;border-radius:2px;cursor:pointer;color:var(--hi);padding:8px 12px;flex-shrink:0;font-size:18px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .send-btn:disabled{opacity:0.3}
  .chat-footer{text-align:center;font-size:11px;color:var(--dim);margin-top:8px}
  .privacy-note{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:10px 14px;font-size:11px;color:var(--dim);line-height:1.6;text-align:center;margin-bottom:18px}
  .privacy-note strong{color:var(--text);font-weight:400}
</style>
</head>
<body>

<div class="screen active" id="screen-auth">
  <div class="auth-wrap">
    <div class="brand">
      <div class="brand-name">S<span>V</span>IDOK</div>
      <div class="brand-sub">AI that remembers you</div>
    </div>
    <div class="auth-form" id="login-form">
      <input class="auth-input" id="login-email" type="email" placeholder="Email" autocomplete="email">
      <input class="auth-input" id="login-pass" type="password" placeholder="Пароль">
      <button class="auth-btn" id="login-btn">Увійти</button>
      <div class="auth-line"><span>або</span></div>
      <div class="auth-switch">Немає акаунту? <a id="show-reg">Зареєструватись</a></div>
    </div>
    <div class="auth-form" id="reg-form" style="display:none">
      <input class="auth-input" id="reg-email" type="email" placeholder="Email" autocomplete="email">
      <input class="auth-input" id="reg-pass" type="password" placeholder="Пароль">
      <button class="auth-btn" id="reg-btn">Створити акаунт</button>
      <div class="auth-switch">Вже є акаунт? <a id="show-login">Увійти</a></div>
    </div>
    <div class="err" id="auth-err"></div>
  </div>
</div>

<div class="screen" id="screen-onboard">
  <div class="onboard-wrap">
    <div class="dots">
      <div class="dot active" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>
    <div class="onboard-q" id="ob-q"></div>
    <div class="onboard-hint" id="ob-hint"></div>
    <form id="ob-form" onsubmit="handleObSubmit(event)" style="width:100%;display:flex;flex-direction:column;gap:16px">
      <input class="ob-input" id="ob-input" name="answer" type="text" autocomplete="off" autocorrect="off">
      <input type="submit" value="ДАЛІ →" style="background:var(--accent);border:none;border-radius:2px;padding:16px;color:var(--hi);font-family:Inter,sans-serif;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;width:100%;-webkit-appearance:none">
    </form>
  </div>
</div>

<div class="screen" id="screen-chat">
  <div class="chat-header">
    <div class="chat-logo">S<span>V</span>IDOK</div>
    <div class="chat-meta" id="chat-meta"></div>
  </div>
  <div class="messages" id="messages">
    <div class="privacy-note"><strong>Твої розмови приватні.</strong><br>Ніхто не читає що ти пишеш — тільки ти і Свідок.</div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Напиши що зараз…" rows="1"></textarea>
      <button class="send-btn" id="send-btn" disabled>→</button>
    </div>
    <div class="chat-footer">Свідок пам'ятає. Але не судить.</div>
  </div>
</div>

<script>
var zodiacTraits={Овен:'пряма, діє швидко',Телець:'повільно відкривається',Близнюки:'жвава, мінлива',Рак:'глибоко відчуває',Лев:'яскрава',Діва:'аналітична',Терези:'шукає балансу',Скорпіон:'інтенсивна',Стрілець:'оптимістична',Козеріг:'амбітна',Водолій:'незалежна',Риби:'чуттєва'};
var lpMeaning={1:'лідер',2:'дипломат',3:'творча',4:'надійна',5:'вільна',6:'турботлива',7:'мислитель',8:'амбітна',9:'мудра',11:'інтуїт',22:'будівничий'};
var obSteps=[{q:'Як тебе звати?',hint:"Просто ім'я",key:'name'},{q:'Коли ти народилась?',hint:'день.місяць.рік — наприклад 14.06.1992',key:'birthdate'},{q:'Що зараз займає найбільше місця у твоїй голові?',hint:'Не те що важливо. Те що просто крутиться.',key:'first'}];

var user=null,history=[],loading=false,obStep=0,obData={};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  document.getElementById('screen-'+id).classList.add('active');
}

function showErr(m){
  var e=document.getElementById('auth-err');
  e.textContent=m;e.style.display='block';
  setTimeout(function(){e.style.display='none'},3000);
}

document.getElementById('show-reg').addEventListener('click',function(){
  document.getElementById('login-form').style.display='none';
  document.getElementById('reg-form').style.display='flex';
});

document.getElementById('show-login').addEventListener('click',function(){
  document.getElementById('reg-form').style.display='none';
  document.getElementById('login-form').style.display='flex';
});

document.getElementById('login-btn').addEventListener('click',function(){
  var email=document.getElementById('login-email').value.trim();
  if(!email){showErr('Введи email');return;}
  fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getUser',email:email})})
  .then(function(r){return r.json()})
  .then(function(u){
    if(!u||!u.id){showErr('Акаунт не знайдено');return;}
    user=u;startChat();
  }).catch(function(){showErr('Помилка з\'єднання')});
});

document.getElementById('reg-btn').addEventListener('click',function(){
  var email=document.getElementById('reg-email').value.trim();
  var pass=document.getElementById('reg-pass').value;
  if(!email||!pass){showErr('Заповни всі поля');return;}
  obData={email:email};
  showScreen('onboard');
  updateOb(0);
});

function updateOb(step){
  obStep=step;
  for(var i=0;i<3;i++){
    document.getElementById('d'+i).classList.toggle('active',i<=step);
  }
  var s=obSteps[step];
  document.getElementById('ob-q').textContent=s.q;
  document.getElementById('ob-hint').textContent=s.hint;
  document.getElementById('ob-input').value='';
  document.getElementById('ob-input').placeholder=s.hint;
  setTimeout(function(){document.getElementById('ob-input').focus()},300);
}

function doNextOb(){
  var val=document.getElementById('ob-input').value.trim();
  if(!val){
    document.getElementById('ob-input').style.borderColor='#e74c3c';
    setTimeout(function(){document.getElementById('ob-input').style.borderColor='var(--accent)'},1000);
    return;
  }
  obData[obSteps[obStep].key]=val;
  if(obStep<obSteps.length-1){
    updateOb(obStep+1);
    return;
  }
  fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'createUser',email:obData.email,name:obData.name,birthdate:obData.birthdate})})
  .then(function(r){return r.json()})
  .then(function(u){
    if(!u||!u.id){showErr('Помилка. Спробуй ще.');return;}
    user=u;startChat(obData.first);
  }).catch(function(){showErr('Помилка з\'єднання')});
}

function handleObSubmit(e){
  e.preventDefault();
  doNextOb();
}

function buildSystem(){
  var astro=user.astro?JSON.parse(user.astro):null;
  var ctx='';
  if(astro){ctx='\nЩО ТИ ЗНАЄШ:\nЗнак: '+astro.zodiac+' — '+(zodiacTraits[astro.zodiac]||'')+'\nЧисло: '+astro.lifePath+' — '+(lpMeaning[astro.lifePath]||'')+'\nВикористовуй внутрішньо. Не згадуй знаки прямо.';}
  return 'Ти — Свідок.\nТи близький друг який пам\'ятає людину краще ніж вона сама.'+ctx+'\n\nПАМ\'ЯТЬ:\n'+(user.memory||'Перша розмова.')+'\n\nЯК ГОВОРИШ:\nПросто. Коротко. Одне питання.\nНе починай з "Я".\nНе оцінюєш. Не мотивуєш. Не радиш.\n\nПІСЛЯ ВІДПОВІДІ:\nMEMORY_UPDATE: [одне речення або none]';
}

function startChat(first){
  showScreen('chat');
  var astro=user.astro?JSON.parse(user.astro):null;
  document.getElementById('chat-meta').textContent=astro?(user.name+' · '+astro.zodiac):(user.name||'');
  if(first){setTimeout(function(){processMsg(first,true)},600);}
  else{setTimeout(function(){addBot('Що зараз відбувається?')},500);}
}

var inp=document.getElementById('input');
var sendBtn=document.getElementById('send-btn');

inp.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
  sendBtn.disabled=this.value.trim()==='';
});

sendBtn.addEventListener('click',function(){doSend()});
sendBtn.addEventListener('touchend',function(e){e.preventDefault();doSend()});
inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}
});

function doSend(){
  var text=inp.value.trim();
  if(!text||loading)return;
  inp.value='';inp.style.height='auto';sendBtn.disabled=true;
  processMsg(text,false);
}

function addMsg(role,text){
  var msgs=document.getElementById('messages');
  var div=document.createElement('div');div.className='msg '+(role==='user'?'user':'bot');
  var who=document.createElement('div');who.className='msg-who';who.textContent=role==='user'?(user&&user.name?user.name:'Ти'):'Свідок';
  var bubble=document.createElement('div');bubble.className='msg-bubble';
  div.appendChild(who);div.appendChild(bubble);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
  return bubble;
}

function addBot(text){
  var b=addMsg('assistant','');
  var i=0;b.textContent='';
  function t(){if(i<text.length){b.textContent+=text[i];i++;document.getElementById('messages').scrollTop=99999;setTimeout(t,14);}}
  t();
}

function showTyping(){
  var msgs=document.getElementById('messages');
  var div=document.createElement('div');div.className='msg bot';div.id='typ';
  var who=document.createElement('div');who.className='msg-who';who.textContent='Свідок';
  var t=document.createElement('div');t.className='typing';t.innerHTML='<span></span><span></span><span></span>';
  div.appendChild(who);div.appendChild(t);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){var e=document.getElementById('typ');if(e)e.remove();}

function processMsg(text,isFirst){
  if(!isFirst)addMsg('user',text);
  history.push({role:'user',content:text});
  loading=true;showTyping();
  setTimeout(function(){
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history,system:buildSystem()})})
    .then(function(r){return r.json()})
    .then(function(data){
      var reply=(data.content&&data.content[0]&&data.content[0].text)||'...';
      var m=reply.match(/MEMORY_UPDATE:\s*(.+)$/m);
      if(m&&m[1]&&m[1].trim()!=='none'&&user){
        var newMem=(user.memory?user.memory+'\n':'')+m[1].trim();
        user.memory=newMem;
        fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateMemory',userId:user.id,memory:newMem})});
      }
      reply=reply.replace(/\nMEMORY_UPDATE:.+$/m,'').trim();
      removeTyping();addBot(reply);
      history.push({role:'assistant',content:reply});
      loading=false;
    }).catch(function(){removeTyping();addBot('Щось пішло не так. Спробуй ще раз.');loading=false;});
  },900+Math.random()*700);
}
</script>
</body>
</html>
